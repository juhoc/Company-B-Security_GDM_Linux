    - name: Buscar evidencia de archivos *.asb
      become: true
      find:
        path: "{{ gdmfsasb }}"
        patterns: "*.asb"
      register: evidencia_asb

    - name: Borrar evidencias .asb
      become: true
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ evidencia_asb.files }}"      
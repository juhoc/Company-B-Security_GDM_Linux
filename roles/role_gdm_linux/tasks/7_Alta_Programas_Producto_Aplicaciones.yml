- name: altas de Aplicaciones antes de IPL de OS Linux
  block:
    - name: alta Aplicaciones
      shell: if [ -f {{ gdmfsasb }}httpserver80s.asb ]; then echo alta; fi
      register: alta_http80s

    - shell: |
        for https in $(cat {{ gdmfsasb }}httpserver80s.asb)
        do
          $https stop
        done
      when: alta_http80s.stdout == "alta"
      ignore_errors: true

    - shell: if [ -f {{ gdmfsasb }}httpserver80d.asb ]; then echo alta; fi
      register: alta_http80d

    - shell: |
        for https in $(cat {{ gdmfsasb }}httpserver80d.asb)
        do
          $https stop
        done
      when: alta_http80d.stdout == "alta"
      ignore_errors: true

    - shell: if [ -f {{ gdmfsasb }}httpserver85d.asb ]; then echo alta; fi
      register: alta_http85s

    - shell: |
        for https in $(cat {{ gdmfsasb }}httpserver85s.asb)
        do
          $https stop
        done
      become: true
      become_user: was60
      become_method: su
      become_exe: sudo su -
      when: alta_http85s.stdout == "alta"
      ignore_errors: true

    - shell: if [ -f {{ gdmfsasb }}httpserver85d.asb ]; then echo alta; fi
      register: alta_http85d

    - shell: |
        for https in $(cat {{ gdmfsasb }}httpserver85d.asb)

---
- name: Tareas por bloques - Validacion formato CRQ o ICR
  block:
    - name: Validando Formato de Cambio o Incidente
      assert:
        that:
          - idcrqincreq | string | regex_search('(CRQ|INC|REQ)[0-9]{12}')
        fail_msg: "El CRQ, INC o REQ no cumplen con la condiciones del formato"
        success_msg: "El CRQ, INC o REQ cumplen con las condiciones del formato"
      run_once: true
      delegate_to: localhost

# ----------- START Instalación de parches RHEL ---------- #

- name: Infraestructura - send & run script upgrade RHEL
  block:
    - name: Check the version of RHEL to transfer the RPM wget to the remote Linux
      shell: |
        if [ "{{ ansible_facts['distribution_file_variety'] }}{{ ansible_facts['distribution_major_version'] }}" = "RedHat7" ]; then
          echo "wget-1.14-18.el7_6.1.x86_64.rpm"
        elif [ "{{ ansible_facts['distribution_file_variety'] }}{{ ansible_facts['distribution_major_version'] }}" = "RedHat8" ]; then
          echo "wget-1.19.5-11.el8.x86_64.rpm"
        fi
      register: existrpm

    - name: Define the RPM wget version
      set_fact:
        software: "{{ existrpm.stdout | string }}"
        
    - name: Copying rpm
      become: true
      copy:
        src: files/{{ software }}
        dest: "{{ destino }}"
        mode: 0755    
        

    - name: Copying script
      become: true
      copy:
        src: files/so_upgrade_mngr_v2.sh
        dest: "{{ destino }}"
        mode: 0755
        
    - name: Privileges on FS ANSIBLE
      become: true
      file:
        path: "{{ destino }}"
        state: directory
        recurse: true
        mode: 0755

    - name: Run script infrastructure patches
      become: true
      shell: "export PATH=$PATH:/sbin:/usr/sbin && {{ destino }}/so_upgrade_mngr_v2.sh"
      register: report_patch_infra
      environment:
         PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:{{ ansible_env.PATH }}"
         
    - name: Delete script
      become: true
      file: 
        path: "{{ destino }}/{{ item }}"
        state: absent
      loop: 

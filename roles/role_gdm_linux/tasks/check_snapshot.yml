---
- name: Tareas por bloques - VM Snapshot Monitoring
  block:
    - name: Sensar plantilla VM Snapshot 
      uri:
        url: "{{ lanzar_snapshot.location }}"
        validate_certs: no
        force_basic_auth: true
        method: GET
        headers:
          Authorization: Bearer {{ tower_token }}
        status_code: 200, 201, 204
      register: trabajos
      until: trabajos.json.status == 'successful' or trabajos.json.status == 'failed' or trabajos.json.status == 'canceled' 
      failed_when: trabajos.json.status == 'failed' or trabajos.json.status == 'canceled'
      delay: "{{ accionjtp3.demora }}"
      retries: "{{ accionjtp3.reintentos }}"
  delegate_to: localhost
  run_once: true
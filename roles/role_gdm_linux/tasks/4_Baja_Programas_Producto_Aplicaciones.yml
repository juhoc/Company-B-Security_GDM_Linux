---
- name: Tareas por bloques - Validacion formato CRQ o ICR
  block:
    - name: Validando Formato de Cambio o Incidente
      assert:
        that:
          - idcrqincreq | string | regex_search('(CRQ|INC|REQ)[0-9]{12}')
        fail_msg: "El CRQ, INC o REQ no cumplen con la condiciones del formato"
        success_msg: "El CRQ, INC o REQ cumplen con las condiciones del formato"
      run_once: true
      delegate_to: localhost

- name: Bajas de Programas Producto antes de IPL de OS Linux
  block:
    - name: Baja de Programas Producto
      shell: if grep -q "ACTIVO" {{ gdmfsasb }}patrol.asb 2>/dev/null; then echo baja; fi
      register: baja_patrol

    - include_tasks: bajas_ppaps/baja_patrol.yml
      when: baja_patrol.stdout == "baja"

    - shell: if grep -q "ACTIVO" {{ gdmfsasb }}capacity.asb 2>/dev/null; then echo baja; fi
      register: baja_capacity

    - include_tasks: bajas_ppaps/baja_capacity.yml
      when: baja_capacity.stdout == "baja"

    - shell: if grep -q "ACTIVO" {{ gdmfsasb }}ctm.asb 2>/dev/null; then echo baja; fi
      register: baja_controlm

    - include_tasks: bajas_ppaps/baja_controlm.yml
      when: baja_controlm.stdout == "baja"

    - shell: if grep -q "ACTIVO" {{ gdmfsasb }}dim.asb 2>/dev/null; then echo baja; fi
      register: baja_dimensions

    - include_tasks: bajas_ppaps/baja_dimensions.yml
      when: baja_dimensions.stdout == "baja"

    - shell: if grep -q "ACTIVO" {{ gdmfsasb }}cd.asb 2>/dev/null; then echo baja; fi
      register: baja_connectdirect

    - include_tasks: bajas_ppaps/baja_connectdirect.yml
      when: baja_connectdirect.stdout == "baja"

#    - shell: if [ -f {{ gdmfsasb }}s1.asb ]; then echo baja; fi
#      register: baja_s1

#    - include_tasks: bajas_ppaps/baja_sentinelone.yml
#      when: baja_s1.stdout == "baja"
  ignore_errors: true
- name: Bajas de Aplicaciones antes de IPL de OS Linux
  block:
    - name: Baja Aplicaciones
      shell: if [ -f {{ gdmfsasb }}httpserver80s.asb ]; then echo baja; fi
      register: baja_http80s

    - shell: |
        for https in $(cat {{ gdmfsasb }}httpserver80s.asb)
        do
          $https stop
        done
      when: baja_http80s.stdout == "baja"

    - shell: if [ -f {{ gdmfsasb }}httpserver80d.asb ]; then echo baja; fi
      register: baja_http80d
      ignore_errors: true

    - shell: |
        for https in $(cat {{ gdmfsasb }}httpserver80d.asb)
        do
          $https stop
        done
      when: baja_http80d.stdout == "baja"
      ignore_errors: true

    - shell: if [ -f {{ gdmfsasb }}httpserver85s.asb ]; then echo baja; fi
      register: baja_http85s

    - shell: |
        for https in $(cat {{ gdmfsasb }}httpserver85s.asb)
        do
          $https stop
        done
      become: true
      become_user: was60
      become_method: su
      become_exe: sudo su -
      when: baja_http85s.stdout == "baja"
      ignore_errors: true

    - shell: if [ -f {{ gdmfsasb }}httpserver85d.asb ]; then echo baja; fi
      register: baja_http85d

    - shell: |
        for https in $(cat {{ gdmfsasb }}httpserver85d.asb)
        do
          $https stop
        done
      become: true
      become_user: was60
      become_method: su
      become_exe: sudo su -
      when: baja_http85d.stdout == "baja"
      ignore_errors: true

